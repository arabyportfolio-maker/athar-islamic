<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>زر الواتساب العائم — معاينة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #FAFAF8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-demo {
      text-align: center;
      padding: 40px;
    }

    .page-demo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #059669;
      margin-bottom: 12px;
    }

    .page-demo p {
      font-size: 16px;
      color: #6B7280;
    }

    /* ===== زر الواتساب العائم ===== */
    .whatsapp-float {
      position: fixed;
      bottom: 32px;
      left: 24px;       /* يسار في RTL = يمين في الواجهة */
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .whatsapp-label {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      white-space: nowrap;
      user-select: none;
      animation: labelPop 0.4s ease 0.6s both;
    }

    .whatsapp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #25D366;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    .whatsapp-btn:hover {
      transform: scale(1.12);
      box-shadow: 0 6px 28px rgba(37, 211, 102, 0.65);
    }

    .whatsapp-btn svg {
      width: 30px;
      height: 30px;
      fill: #ffffff;
    }

    /* نبضة متكررة */
    .whatsapp-btn::before {
      content: '';
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(37, 211, 102, 0.35);
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    @keyframes bounceIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    @keyframes labelPop {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    /* ===== Footer ===== */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: #6B7280;
      background: rgba(250, 250, 248, 0.9);
      backdrop-filter: blur(8px);
      border-top: 1px solid #E5E7EB;
    }

    .footer a {
      color: #059669;
      font-weight: 600;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- محتوى الصفحة التجريبية -->
  <div class="page-demo">
    <h1>🌿 أثر إسلامي</h1>
    <p>منصة إسلامية متكاملة<br>ابحث عن الزر في الزاوية اليمنى السفلى ↘</p>
  </div>

  <!-- ===== زر الواتساب العائم ===== -->
  <div class="whatsapp-float">
    <span class="whatsapp-label">تواصل مع المطور</span>
    <a
      class="whatsapp-btn"
      href="https://wa.me/201121827680?text=%D9%85%D8%B1%D8%AD%D8%A8%D8%A7%D8%8C%20%D8%A3%D8%B1%D9%8A%D8%AF%20%D8%A7%D9%84%D8%AA%D9%88%D8%A7%D8%B5%D9%84%20%D8%A8%D8%AE%D8%B5%D9%88%D8%B5%20%D9%85%D8%B4%D8%B1%D9%88%D8%B9%20%D8%A3%D8%AB%D8%B1%20%D8%A5%D8%B3%D9%84%D8%A7%D9%85%D9%8A"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="تواصل مع المطور عبر واتساب"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
        <path d="M16.002 2.667C8.638 2.667 2.667 8.638 2.667 16c0 2.34.626 4.634 1.813 6.643L2.667 29.333l6.875-1.797A13.27 13.27 0 0 0 16.002 29.333c7.364 0 13.332-5.97 13.332-13.333S23.366 2.667 16.002 2.667zm0 24.533a11.148 11.148 0 0 1-5.695-1.565l-.408-.242-4.08 1.065 1.087-3.965-.265-.407A11.133 11.133 0 0 1 4.8 16c0-6.176 5.027-11.2 11.202-11.2C22.176 4.8 27.2 9.824 27.2 16s-5.024 11.2-11.198 11.2zm6.14-8.387c-.336-.168-1.99-.983-2.298-1.094-.308-.113-.532-.168-.757.168-.224.336-.869 1.093-1.065 1.318-.196.223-.392.252-.728.084-.336-.168-1.416-.522-2.697-1.666-1-.892-1.675-1.993-1.87-2.329-.196-.336-.021-.518.147-.685.151-.15.336-.392.504-.588.168-.196.224-.336.336-.56.112-.224.056-.42-.028-.588-.084-.168-.757-1.822-1.037-2.495-.273-.655-.55-.566-.757-.577l-.645-.011a1.24 1.24 0 0 0-.896.42c-.308.336-1.177 1.149-1.177 2.803s1.205 3.249 1.373 3.473c.168.224 2.37 3.617 5.74 5.073.803.346 1.43.553 1.918.708.806.256 1.54.22 2.12.133.647-.097 1.99-.813 2.27-1.6.28-.784.28-1.456.196-1.596-.083-.14-.307-.224-.643-.392z"/>
      </svg>
    </a>
  </div>

  <!-- Footer -->
  <div class="footer">
    تم التصميم بواسطة
    <a href="https://www.facebook.com/ElAraby360D" target="_blank" rel="noopener noreferrer">

    </a>

</body>
</html>
